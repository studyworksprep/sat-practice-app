<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" role="img" aria-labelledby="title desc">
  <title id="title">Where to turn a Desmos graph on or off</title>
  <desc id="desc">An expression row with an arrow pointing to the colored circle at its far left.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937" />
    </marker>
  </defs>
  <rect width="760" height="280" rx="20" fill="#f8fafc" />
  <rect x="46" y="34" width="668" height="142" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="3" />
  <rect x="46" y="34" width="72" height="142" rx="14" fill="#f1f5f9" />
  <path d="M118 34 V176" stroke="#cbd5e1" stroke-width="3" />
  <circle cx="82" cy="105" r="18" fill="#2d70b3" stroke="#1d4f84" stroke-width="3" />
  <text x="143" y="117" font-family="Arial, sans-serif" font-size="42" fill="#111827">x² − 5x + 6</text>
  <text x="48" y="235" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#1f2937">Click this colored circle</text>
  <text x="48" y="264" font-family="Arial, sans-serif" font-size="21" fill="#475569">Filled = graph on · faded = graph off</text>
  <path d="M300 222 C250 198 178 168 98 126" fill="none" stroke="#1f2937" stroke-width="5" marker-end="url(#arrow)" />
</svg>
